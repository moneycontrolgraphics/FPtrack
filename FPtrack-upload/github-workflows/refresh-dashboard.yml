name: Refresh Business Frontpages Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Generate dashboard
        run: |
          python scrape_business_frontpages.py \
            --site all \
            --headless \
            --out_csv docs/business_frontpages.csv \
            --out_json docs/business_frontpages.json \
            --out_html docs/index.html

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/business_frontpages.csv docs/business_frontpages.json
          git diff --cached --quiet || git commit -m "Refresh business frontpages data"
          git push
